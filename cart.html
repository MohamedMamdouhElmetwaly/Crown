<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shopping Cart - Crown Dental Store">
  <title>Shopping Cart - Crown Dental Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/logo/crown-chatbot-icon.png">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-container container">
      <div class="navbar-brand">
        <img src="images/logo/crown-chatbot-icon.png" alt="Crown Dental Store Logo" class="navbar-logo">
        <span>Crown Dental Store</span>
      </div>

      <button class="navbar-toggle" id="navbar-toggle">☰</button>

      <ul class="navbar-nav" id="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="categories.html">Categories</a></li>
        <li><a href="about-contact.html">About & Contact</a></li>
      </ul>

      <div class="navbar-icons">
        <a href="https://www.facebook.com/share/1H798BjZV2/" target="_blank" rel="noopener noreferrer" class="navbar-icon" title="Facebook" aria-label="Facebook"><img src="images/social/facebook.svg" alt="Facebook"></a>
        <a href="https://www.instagram.com/crown.dentalstore?igsh=MWJqNnlodHkzOGtucQ==" target="_blank" rel="noopener noreferrer" class="navbar-icon" title="Instagram" aria-label="Instagram"><img src="images/social/instagram.svg" alt="Instagram"></a>
      </div>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <div class="page-content">
    <div class="container">
      <!-- BREADCRUMB -->
      <ol class="breadcrumb">
        <li><a href="index.html">Home</a></li>
        <li>Shopping Cart</li>
      </ol>

      <!-- PAGE TITLE -->
      <div style="margin-bottom: var(--spacing-2xl); text-align: center;">
        <h1>🛒 Shopping Cart</h1>
        <p id="cart-item-count" style="color: var(--color-text-light); font-size: var(--font-size-lg);">Loading cart...</p>
      </div>

      <!-- CART CONTENT -->
      <div class="cart-container">
        <!-- CART ITEMS -->
        <div class="cart-items" id="cart-items">
          <!-- Cart items will be populated by JavaScript -->
        </div>

        <!-- CART SUMMARY -->
        <div class="cart-summary" id="cart-summary">
          <h3>Order Summary</h3>
          <div class="cart-summary-row">
            <span>Subtotal:</span>
            <span id="cart-subtotal">0 EGP</span>
          </div>
          <div class="cart-summary-row cart-summary-total">
            <span>Total:</span>
            <span id="cart-total">0 EGP</span>
          </div>
          <button id="order-now-btn" class="btn btn-success btn-lg btn-block" onclick="orderNow()">
            <img src="images/social/whatsapp_style_icon.svg" alt="WhatsApp" class="btn-icon"> Order Now via WhatsApp
          </button>
          <a href="products.html" class="btn btn-outline btn-block" style="margin-top: var(--spacing-base);">Continue Shopping</a>
        </div>
      </div>

      <!-- EMPTY CART STATE -->
      <div class="empty-cart" id="empty-cart" style="display: none;">
        <div class="empty-state">
          <div class="empty-state-icon">🛒</div>
          <h2>Your Cart is Empty</h2>
          <p>Add some products to your cart to get started!</p>
          <a href="products.html" class="btn btn-primary btn-lg">Browse Products</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
